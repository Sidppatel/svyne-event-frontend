<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&amp;family=Playfair+Display:wght@400;600&amp;display=swap');
      
      .wordmark {
        font-family: 'Fraunces', 'Playfair Display', Georgia, serif;
        font-weight: 600;
        font-size: 110px;
        letter-spacing: -0.02em;
        fill: #1C1917;
      }
    </style>
  </defs>

  <!-- === TICKET STUB ICON === -->
  <g transform="translate(30, 30)">
    <!-- Outer thick ticket outline with rounded right side -->
    <path 
      d="M 0 0 
         L 225 0 
         L 225 40 
         A 10 10 0 0 0 225 120 
         L 225 160 
         L 0 160
         Z" 
      stroke="#8A2D3B" 
      stroke-width="14" 
      stroke-linejoin="miter"
      fill="none"/>
    <!-- Perforation dashed line -->
    <line 
      x1="65" 
      y1="0" 
      x2="65" 
      y2="160" 
      stroke="#8A2D3B" 
      stroke-width="8" 
      stroke-dasharray="16, 15"
      stroke-linecap="butt"/>
  </g>

  <!-- === TYPOGRAPHY === -->
  <g transform="translate(260, 0)">
    <!-- Main TicketSpan Wordmark -->
    <text x="30" y="145" class="wordmark">TicketSpan</text>
  </g>
</svg>
